{{- if .Values.certRenewal }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: cb-haproxy-acme
  namespace: {{ default "monitoring" .Values.global.namespace }}
data:
  acme.json: |
    {{- $config := .Values.acmeConfig | default (list) }}

    {{- if eq (len $config) 0}}
      {{- $domains := list .Values.global.monitoringURL }}

      {{- $defaultConfig := list
        (dict
          "directory" "https://acme-v02.api.letsencrypt.org/directory"
          "key_type" "rsa"
          "email" "serversupport@clearblade.com"
          "domains" $domains
          "file_name" "clearblade-0.pem"
        )
      }}

      {{- $_ := set $ "finalConfig" $defaultConfig }}
    {{- else}}
      {{- $_ := set $ "finalConfig" $config }}
    {{- end }}

    {{ .finalConfig | toJson }}
{{- end }}
