apiVersion: apps/v1
kind: Deployment
metadata:
  name: cb-haproxy
  namespace: {{ default "clearblade" .Values.global.namespace }}
  labels:
    app: cb-haproxy
spec:
  selector:
    matchLabels:
      app: cb-haproxy
  replicas: 1
  template:
    metadata:
      labels:
        app: cb-haproxy
        app.kubernetes.io/name: managed-prom
    spec:
      {{- if .Values.global.imagePullerSecret }}
      imagePullSecrets:
        - name: gcr-json-key
      {{- end }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 1
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - cb-haproxy
                topologyKey: "topology.kubernetes.io/zone"
      volumes:
        - name: haproxy-config-volume
          secret:
            secretName: cb-haproxy-config
        {{- if .Values.certRenewal }}
        - name: haproxy-acme-volume
          configMap:
            name: cb-haproxy-acme
        - name: haproxy-controller-volume
          emptyDir: {}
        {{- end }}
        - name: haproxy-cert-volume
          emptyDir: {}
      serviceAccountName: {{ .Values.global.gcpGSMServiceAccount }}
      initContainers:
      - name: pull-certificates
        image: gcr.io/api-project-320446546234/cb_controller:cli-latest
        env:
          - name: CERT_DIR
            value: etc/haproxy-ssl
          - name: PROJECT
            value: {{ .Values.global.gcpProject }}
          - name: NAMESPACE
            value: {{ .Values.global.namespace }}
          - name: PULL_ONLY
            value: "true"
        volumeMounts:
          - name: haproxy-cert-volume
            mountPath: /etc/haproxy-ssl/
      {{- if .Values.global.tolerations }}
      tolerations:
{{ .Values.global.tolerations | toYaml | indent 6 }}
      {{- end }}
      {{- if .Values.global.nodeSelector }}
      nodeSelector:
        {{ .Values.global.nodeSelector }}
      {{- end }}
      securityContext:
        sysctls:
          - name: net.ipv4.ip_local_port_range
            value: "2000 65001"
      containers:
        - name: cb-haproxy
          image: "{{ .Values.image }}:{{ .Values.imageTag }}"
          resources:
            requests:
              memory: {{ .Values.requestMemory }}
              cpu: {{ .Values.requestCPU }}
            limits:
              cpu: {{ .Values.limitCPU }}
              memory: {{ .Values.limitMemory }}
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: haproxy-config-volume
              mountPath: /usr/local/etc/haproxy/
            - name: haproxy-cert-volume
              mountPath: /etc/ssl/
            {{- if .Values.certRenewal }}
            - name: haproxy-controller-volume
              mountPath: /var/run
            - name: haproxy-acme-volume
              mountPath: /usr/local/etc/acme/
            {{- end }}
        {{- if .Values.certRenewal }}
        - name: haproxy-controller
          image: "gcr.io/api-project-320446546234/cb_controller:{{ .Values.controllerVersion }}"
          env:
            - name: CERT_DIR
              value: etc/haproxy-ssl
            - name: CONFIG_PATH
              value: usr/local/etc/haproxy/haproxy.cfg
            - name: ADDRESS
              value: "/var/run/cb-haproxy.sock"
            - name: PROJECT
              value: {{ .Values.global.gcpProject }}
            - name: NAMESPACE
              value: {{ .Values.global.namespace }}
            - name: RENEWAL_DAYS
              value: "{{ .Values.renewalDays }}"
            - name: ACME_CONFIG_PATH
              value: "usr/local/etc/acme/acme.json"
          ports:
            - containerPort: 5001
              name: controller
          resources:
            limits:
              cpu: 250m
              memory: 180Mi
            requests:
              cpu: 102m
              memory: 180Mi
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: haproxy-config-volume
              mountPath: /usr/local/etc/haproxy/
            - name: haproxy-acme-volume
              mountPath: /usr/local/etc/acme/
            - name: haproxy-cert-volume
              mountPath: /etc/haproxy-ssl/
            - name: haproxy-controller-volume
              mountPath: /var/run
        {{- end }}
        - name: haproxy-exporter
          image: prom/haproxy-exporter:latest
          command: ["haproxy_exporter"]
          args: ["--haproxy.scrape-uri=http://{{ .Values.stats_auth }}@localhost:9876/haproxy_stats?stats;csv"]
          ports:
            - containerPort: 9101
              name: metrics
          resources:
            limits:
              cpu: 250m
              memory: 180Mi
            requests:
              cpu: 102m
              memory: 180Mi
