{{- $useGSM := false -}}
{{- if eq .Values.credentialsSource "gsm" -}}
{{- $useGSM = true -}}
{{- else if eq .Values.credentialsSource "values" -}}
{{- $useGSM = false -}}
{{- else -}}
{{- $useGSM = eq .Values.global.secretManager "gsm" -}}
{{- end -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cb-iotcore
  namespace: {{ default "clearblade" .Values.global.namespace }}
spec:
  selector:
    matchLabels:
      app: cb-iotcore
  replicas: 1
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: cb-iotcore
        app.kubernetes.io/name: managed-prom
    spec:
      {{- if $useGSM }}
      serviceAccountName: clearblade-gsm-read
      {{- end }}
      {{- if .Values.global.imagePullerSecret }}
      imagePullSecrets:
        - name: gcr-json-key
      {{- end }}
      tolerations:
      - key: node.kubernetes.io/not-ready
        operator: Exists
        effect: NoExecute
        tolerationSeconds: 0
      - key: node.kubernetes.io/unreachable
        operator: Exists
        effect: NoExecute
        tolerationSeconds: 0
      {{- if or .Values.checkClearbladeReadiness $useGSM }}
      initContainers:
      {{- end }}
      {{- if .Values.checkClearbladeReadiness }}
      - name: check-clearblade-readiness
        image: ellerbrock/alpine-bash-curl-ssl
        command:
        - bash
        - "-c"
        - |
          set -x;
          while [ $(curl -sw '%{http_code}' "https://{{ .Values.global.enterpriseBaseURL }}/api/about" -o /dev/null) -ne 200 ]; do
            echo waiting for clearblade; sleep 5;
          done;
          # Give clearblade just a little more time to really start for real
          sleep 10;
      {{- end }}
      {{- if $useGSM }}
      - name: pull-iotcore-credentials
        image: google/cloud-sdk:slim
        command: ["/bin/bash"]
        args:
          - -c
          - |
            SECRET_NAME="{{ default "clearblade" .Values.global.namespace }}_{{ default "iotcore-credentials" .Values.gsmSecretName }}"
            echo "Fetching secret: $SECRET_NAME"
            if ! gcloud secrets versions access latest --secret="$SECRET_NAME" > /tmp/iotcore-credentials.json 2>/dev/null; then
              echo "Secret $SECRET_NAME not found or not accessible, continuing without credentials"
              exit 0
            fi
            python3 -c "
            import json, sys
            try:
                with open('/tmp/iotcore-credentials.json') as f:
                    data = json.load(f)
            except (json.JSONDecodeError, FileNotFoundError, ValueError):
                print('No valid credentials JSON found, continuing without credentials')
                sys.exit(0)
            mapping = {
                'mailgun': 'mailgun.json',
                'masterCreds': 'master-system-creds.json',
            }
            found = 0
            for key, filename in mapping.items():
                if key in data:
                    with open(f'/etc/iotcore/{filename}', 'w') as out:
                        json.dump(data[key], out)
                    print(f'Wrote credential: {key} -> {filename}')
                    found += 1
                else:
                    print(f'Credential not found in secret: {key} (skipping)')
            print(f'Loaded {found}/{len(mapping)} credentials')
            "
        volumeMounts:
          - name: cb-iotcore-config-volume
            mountPath: /etc/iotcore/
      {{- end }}
      containers:
        - name: cb-iotcore
          {{- if .Values.imageURL }}
          image: {{- .Values.imageURL }}
          {{- else }}
          image: gcr.io/api-project-320446546234/iotcore:{{ .Values.version }}
          {{- end }}
          command: ["/bin/sh"]
          args:
            - -c
            - |
              CRED_FLAGS=""
              [ -f /etc/iotcore/mailgun.json ] && CRED_FLAGS="$CRED_FLAGS -key-mailgun-file=/etc/iotcore/mailgun.json"
              [ -f /etc/iotcore/master-system-creds.json ] && CRED_FLAGS="$CRED_FLAGS -master-system-creds=/etc/iotcore/master-system-creds.json"
              exec iotcore-sidecar \
                -reg-key="{{ .Values.global.enterpriseRegistrationKey }}" \
                -regions="{{ .Values.regions }}" \
                -url="https://{{ .Values.global.enterpriseBaseURL }}" \
                $CRED_FLAGS
          volumeMounts:
          - name: iotcore
            mountPath: /etc/clearblade/conf/iotcore
          - name: cb-iotcore-config-volume
            mountPath: /etc/iotcore/
          ports:
            - containerPort: 8080
          imagePullPolicy: Always
          resources:
            requests:
              cpu: {{ .Values.requestCPU }}
              memory: {{ .Values.requestMemory }}
            limits:
              cpu: {{ .Values.limitCPU }}
              memory: {{ .Values.limitMemory }}
      {{- if .Values.global.tolerations }}
      tolerations:
{{ .Values.global.tolerations | toYaml | indent 6 }}
      {{- end }}
      {{- if .Values.nodeSelector }}
      nodeSelector:
        {{ .Values.nodeSelector }}
      {{- else if .Values.global.nodeSelector }}
      nodeSelector:
        {{ .Values.global.nodeSelector }}
      {{- end }}
      volumes:
        - name: iotcore
          persistentVolumeClaim:
            claimName: cb-iotcore-pvc
        {{- if $useGSM }}
        - name: cb-iotcore-config-volume
          emptyDir: {}
        {{- else }}
        - name: cb-iotcore-config-volume
          secret:
            secretName: cb-iotcore-config
        {{- end }}
