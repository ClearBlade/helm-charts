{{- if .Values.global.pgBouncerEnabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cb-pgbouncer
  namespace: {{ default "clearblade" .Values.global.namespace }}
  labels:
    app: cb-pgbouncer
spec:
  replicas: {{ .Values.pgBouncer.replicas }}
  selector:
    matchLabels:
      app: cb-pgbouncer
  template:
    metadata:
      labels:
        app: cb-pgbouncer
    spec:
      {{- if .Values.global.imagePullerSecret }}
      imagePullSecrets:
        - name: gcr-json-key
      {{- end }}
      {{- if .Values.global.tolerations }}
      tolerations:
{{ .Values.global.tolerations | toYaml | indent 6 }}
      {{- end }}
      {{- if .Values.nodeSelector }}
      nodeSelector:
        {{ .Values.nodeSelector }}
      {{- else if .Values.global.nodeSelector }}
      nodeSelector:
        {{ .Values.global.nodeSelector }}
      {{- end }}
      {{- if eq .Values.global.secretManager "gsm" }}
      serviceAccountName: {{ .Values.global.gcpGSMServiceAccount }}
      {{- end }}
      {{- if or (eq .Values.global.secretManager "gsm") (eq .Values.global.secretManager "asm") }}
      initContainers:
        - name: init
          {{- if eq .Values.global.secretManager "gsm" }}
          image: google/cloud-sdk:slim
          command: ["/bin/sh"]
          args:
            - -c
            - >-
                set -e;

                echo "Waiting for Workload Identity to be ready...";
                for i in $(seq 1 10); do
                  if curl -s -H "Metadata-Flavor: Google" \
                    "http://metadata.google.internal/computeMetadata/v1/instance/service-accounts/default/email" > /dev/null; then
                    echo "Workload Identity is ready!";
                    break;
                  fi;
                  echo "Metadata not ready (attempt $i), retrying in 2s...";
                  sleep 2;
                done;

                echo "Fetching secrets with retries...";
                for i in $(seq 1 25); do
                  if PRIMARY=$(gcloud secrets versions access latest --secret={{ default "clearblade" .Values.global.namespace }}_postgres-primary-password); then
                    echo "Secrets fetched successfully.";
                    echo "export POSTGRESQL_PASSWORD='$PRIMARY'" > /env/db/vars;
                    break;
                  else
                    echo "Secret fetch failed (attempt $i), retrying in 3s...";
                    sleep 3;
                  fi;
                done;
          {{- else if eq .Values.global.secretManager "asm" }}
          image: amazon/aws-cli:latest
          command: ["/bin/sh"]
          args:
            - -c
            - >-
                PRIMARY=$(aws secretsmanager get-secret-value --secret-id {{ default "clearblade" .Values.global.namespace }}_postgres-primary-password --region {{ default "us-east-1" .Values.global.awsRegion }} --query SecretString --output text);
                echo "export POSTGRESQL_PASSWORD='$PRIMARY'" > /env/db/vars;
          {{- end }}
          volumeMounts:
            - name: pgbouncer-env-vars-volume
              mountPath: /env/db
      {{- end }}
      containers:
        - name: pgbouncer
          image: "{{ .Values.pgBouncer.image }}:{{ .Values.pgBouncer.imageTag }}"
          imagePullPolicy: IfNotPresent
          {{- if or (eq .Values.global.secretManager "gsm") (eq .Values.global.secretManager "asm") }}
          command: ["/bin/sh"]
          args:
            - -c
            - >-
                source /env/db/vars &&
                exec /entrypoint.sh
          {{- end }}
          ports:
            - containerPort: 5432
              name: pgbouncer
          env:
            - name: PGBOUNCER_DATABASE
              value: "{{ .Values.pgBouncer.database }}"
            - name: POSTGRESQL_HOST
              value: "cb-postgres-0.cb-postgres-headless.{{ default "clearblade" .Values.global.namespace }}.svc.cluster.local"
            - name: POSTGRESQL_PORT
              value: "{{ .Values.port }}"
            - name: POSTGRESQL_USERNAME
              value: "{{ .Values.user.primary }}"
            - name: PGBOUNCER_PORT
              value: "5432"
            - name: PGBOUNCER_POOL_MODE
              value: "{{ .Values.pgBouncer.poolMode }}"
            - name: PGBOUNCER_DEFAULT_POOL_SIZE
              value: "{{ .Values.pgBouncer.defaultPoolSize }}"
            - name: PGBOUNCER_MAX_CLIENT_CONN
              value: "{{ .Values.pgBouncer.maxClientConn }}"
            - name: PGBOUNCER_MAX_DB_CONNECTIONS
              value: "{{ .Values.maxConnections }}"
            - name: PGBOUNCER_MAX_PREPARED_STATEMENTS
              value: "{{ .Values.pgBouncer.maxPreparedStatements }}"
            {{- if and (ne .Values.global.secretManager "gsm") (ne .Values.global.secretManager "asm") }}
            - name: POSTGRESQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cb-postgres-secrets
                  key: primary-password
            {{- end }}
          {{- if or (eq .Values.global.secretManager "gsm") (eq .Values.global.secretManager "asm") }}
          volumeMounts:
            - mountPath: /env/db/
              name: pgbouncer-env-vars-volume
          {{- end }}
          resources:
            requests:
              cpu: {{ .Values.pgBouncer.requestCPU }}
              memory: {{ .Values.pgBouncer.requestMemory }}
            limits:
              cpu: {{ .Values.pgBouncer.limitCPU }}
              memory: {{ .Values.pgBouncer.limitMemory }}
          livenessProbe:
            tcpSocket:
              port: 5432
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            tcpSocket:
              port: 5432
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
        {{- if .Values.global.monitoringEnabled }}
        - name: pgbouncer-exporter
          image: docker.io/prometheuscommunity/pgbouncer-exporter:v0.12.0
          {{- if or (eq .Values.global.secretManager "gsm") (eq .Values.global.secretManager "asm") }}
          command: ["/bin/sh"]
          args:
            - -c
            - >-
                source /env/db/vars &&
                export PGBOUNCER_EXPORTER_CONNECTION_STRING="host=localhost port=5432 user={{ .Values.user.primary }} password='${POSTGRESQL_PASSWORD}' dbname=pgbouncer sslmode=disable" &&
                exec /bin/pgbouncer_exporter
          {{- else }}
          env:
            - name: PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cb-postgres-secrets
                  key: primary-password
            - name: PGBOUNCER_EXPORTER_CONNECTION_STRING
              value: "host=localhost port=5432 user={{ .Values.user.primary }} password='$(PG_PASSWORD)' dbname=pgbouncer sslmode=disable"
          {{- end }}
          ports:
            - containerPort: 9127
          {{- if or (eq .Values.global.secretManager "gsm") (eq .Values.global.secretManager "asm") }}
          volumeMounts:
            - mountPath: /env/db/
              name: pgbouncer-env-vars-volume
          {{- end }}
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          livenessProbe:
            httpGet:
              path: /metrics
              port: 9127
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /metrics
              port: 9127
            initialDelaySeconds: 5
            periodSeconds: 10
        {{- end }}
      volumes:
        {{- if or (eq .Values.global.secretManager "gsm") (eq .Values.global.secretManager "asm") }}
        - name: pgbouncer-env-vars-volume
          emptyDir: {}
        {{- end }}
{{- end }}

