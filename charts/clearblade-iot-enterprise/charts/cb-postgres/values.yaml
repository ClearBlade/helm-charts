replicas: 3
monitoringEnabled: false
image: timescale/timescaledb
imageTag: "latest-pg15"
cnpgImage: gcr.io/api-project-320446546234/cb_cnpg
cnpgImageTag: 15-18
requestCPU: 1
requestMemory: 4G
limitCPU: 1
limitMemory: 4G
user:
  primary: cbuser
  replica: cbreplication
port: 5432

livenessProbe:
  enabled: true
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  successThreshold: 1
  failureThreshold: 6
readinessProbe:
  enabled: true
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6
  successThreshold: 1

storageSize: 100Gi
 # Base name of disk - "-$i" will be appended in the PV automatically.
 # Disk name must follow this convention: {namespace}-{postgresDiskName}-{number}
 # Example: clearblade-postgres-0
 # In the above example, the value below would just be "postgres"
postgresDiskName: postgres
volumeAZ:
volumeHandle:
maxConnections: 500
maintenanceWorkMem: 256MB
sharedBuffers: 1GB #Recommended 1/4 of memory
effectiveCacheSize: 3GB #Recommended 3/4 of memory

# PgBouncer connection pooler (enable via global.pgBouncerEnabled)
pgBouncer:
  replicas: 1
  # Defaults to cb-pgbouncer from global.registry (ClearBlade's GCR if unset). Set to override the full image path.
  image:
  imageTag: "1.25.1"
  requestCPU: 250m
  requestMemory: 256Mi
  limitCPU: 500m
  limitMemory: 512Mi
  poolMode: session
  maxClientConn: 10000
  maxPreparedStatements: 200
  database: admin
