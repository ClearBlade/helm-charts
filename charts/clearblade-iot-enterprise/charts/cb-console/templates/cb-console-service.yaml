apiVersion: v1
kind: Service
metadata:
  name: cb-console-service
  namespace: {{ default "clearblade" .Values.global.namespace }}
  {{- if and .Values.global.externalHaproxyCbConsoleHttpPort (eq .Values.global.cloud "aws") }}
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: external
    service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: ip
    service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
  {{- end }}
spec:
  {{- if (.Values.global.externalHaproxyCbConsoleHttpPort) }}
  type: LoadBalancer
  ports:
    - name: console-http
      targetPort: 3000
      port: {{ .Values.global.externalHaproxyCbConsoleHttpPort }}
  {{- else }}
  ports:
    - name: console-http
      port: 3000
      protocol: TCP
  {{- end }}
  selector:
    app: cb-console